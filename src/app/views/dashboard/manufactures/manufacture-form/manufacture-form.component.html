<div class="row mb-3" [formGroup]="form">

    <!-- {{ addressForm.valid }} -->


    <div class="col-lg-12 col-12">
        <app-input-group text="Nombre del producto que se fabricara">
            <input formControlName="name" type="text" class="form-control"
                [class.is-invalid]="form.get('name')?.invalid && form.get('name')?.touched"
                placeholder="Nombre de la produccion" aria-label="name" aria-describedby="basic-name" />
        </app-input-group>
    </div>

    @if(type === 'order'){

    <div class="col-lg-12 col-12">
        <label for="supplier_id" class="mb-2">Proveedor</label>
        <div class="mb-3 d-flex justify-content-between align-items-center">
            <app-supplier-selected formControlName="supplier_id" class="w-100 me-2" [suppliers]="suppliers"></app-supplier-selected>
            <app-button [icon]="faPlus" (click)="openVerticallyCentered(newSupplier)">Crear</app-button>
        </div>
    </div>

    <div class="col-lg-6 col-12">
        <app-input-group text="Fecha de entrega">
            <input formControlName="manufacture_start" type="date" class="form-control"
                placeholder="Fecha de entrega" aria-label="delivery_date" aria-describedby="basic-delivery_date" />
        </app-input-group>
    </div>

    <div class="col-lg-6 col-12">
        <app-input-group text="Fecha de entrega">
            <input formControlName="manufacture_end" type="date" class="form-control"
                placeholder="Fecha de entrega" aria-label="delivery_date" aria-describedby="basic-delivery_date" />
        </app-input-group>
    </div>

    }@else{

    }



    <!-- <div class="col-lg-6 col-12">
        <app-input-group text="Presupuesto Aproximado" icontext="S/. ">
            <input type="number" twoDecimals class="form-control is-required" [ngClass]="isInvalid('budget') ? 'is-invalid' : '' "
                placeholder="Presupuesto" formControlName="budget" required />
        </app-input-group>

    </div>

    <div class="col-lg-6 col-12">
        <app-input-group text="Cantidad a fabricar (Espectativa)">
            <input type="number" step="0.1" class="form-control is-required" [ngClass]="isInvalid('quantity_total') ? 'is-invalid' : '' "
                placeholder="0" formControlName="quantity_total" required />
        </app-input-group>

    </div> -->

    <!-- {{ form.value | json }} -->

</div>


<ng-template #newSupplier let-modal>

    <div class="modal-header">
        <h4 class="modal-title">Crear proveedor</h4>
        <button type="button" class="btn-close" aria-label="Close" (click)="modal.dismiss('Cross click')"></button>
    </div>
    <div class="modal-body pb-4">
        <app-supplier-create (emitSupplierCreate)="supplierReceiveCreate($event)"></app-supplier-create>
    </div>

</ng-template>
