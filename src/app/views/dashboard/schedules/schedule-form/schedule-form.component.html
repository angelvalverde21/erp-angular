<form action="" [formGroup]="form">

    <div class="row">

        <div class="col-12 col-md-12 col-lg-12">
            <label for="work_type">Tipo de trabajo</label>
            <select id="work_type" formControlName="work_type" class="form-select mb-3">
                <option value="">Seleccione</option>
                <option value="onsite">Presencial</option>
                <option value="home_office">Remoto</option>
            </select>
        </div>

        <div class="col-6 col-md-6 col-lg-6">
            <label for="start_time">Hora de inicio</label>
            <input type="time" id="start_time" formControlName="start_time" class="form-control mb-3">
        </div>

        <div class="col-6 col-md-6 col-lg-6">
            <label for="end_time">Hora de fin</label>
            <input type="time" id="end_time" formControlName="end_time" class="form-control mb-3">
        </div>

        <div class="col-6 col-md-6 col-lg-6">
            <label for="day_of_week">Día de la semana</label>
            <select id="day_of_week" formControlName="day_of_week" class="form-select mb-3">
                <option value="">Seleccione</option>
                <option value="1">Lunes</option>
                <option value="2">Martes</option>
                <option value="3">Miércoles</option>
                <option value="4">Jueves</option>
                <option value="5">Viernes</option>
                <option value="6">Sábado</option>
                <option value="7">Domingo</option>
            </select>
        </div>

        <div class="col-6 col-md-6 col-lg-6">
            <label for="allow_extra_hours">Permitir horas extras</label>
            <select id="allow_extra_hours" formControlName="allow_extra_hours" class="form-select mb-3">
                <option value="">Seleccione</option>
                <option value="1">Sí</option>
                <option value="0">No</option>
            </select>
        </div>

        <div class="col-6 col-md-6 col-lg-12">
            <label for="start_time">Comentarios</label>
            <textarea id="comments" formControlName="comments" class="form-control mb-3"></textarea>
        </div>

    </div>
</form>
