<ng-select
  [items]="gateways"
  bindLabel="name"
  bindValue="id"
  [clearable]="false"
  [disabled]="isDisabled"
  [ngModel]="gateway_id"
  (ngModelChange)="setGateway($event)"
  placeholder="Selecciona un Gateway"
  class="mb-3">

  <ng-template ng-option-tmp let-item="item">
    <div class="d-flex align-items-center gap-2">
      <span>{{ item.title }}</span>
    </div>
  </ng-template>

  <ng-template ng-label-tmp let-item="item">
    <div class="d-flex align-items-center gap-2">
      <span>{{ item.title }}</span>
    </div>
  </ng-template>

</ng-select>
