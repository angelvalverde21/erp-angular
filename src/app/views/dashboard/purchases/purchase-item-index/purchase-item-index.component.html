<table class="table table-hover mb-3 align-middle">

    <thead>
        <tr>
            <th scope="col" class="text-center" style="width:10%">Qty</th>
            <th scope="col" class="text-center" style="width:15%">Unidad</th>
            <th scope="col" style="width:40%">Registrar Insumo</th>
            <th scope="col" class="text-center" style="width:15%">Precio</th>
            <th scope="col" class="text-center" style="width:15%">Total</th>
            <th scope="col" class="text-center" style="width:5%"></th>
        </tr>
    </thead>

    <tbody>
        @for (control of purchase_items.controls; let i = $index; track i) {
        <tr app-purchase-item-row [formGroup]="control" [index]="i"
            (emitPurchaseItemRemove)="receivePurchaseItemRemove(i)"></tr>
        }
    </tbody>

</table>

<div class="d-flex justify-content-between align-items-center" style="border-top: 0;">
    <span>Items de la compra</span>
    <app-button-add (click)="addItem()">Item</app-button-add>
</div>
