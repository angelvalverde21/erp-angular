@if(loading){
<div class="py-4">
    <app-loading></app-loading>
</div>
}@else{

<form [formGroup]="form">

    <div class="card mb-3">
        <div class="card-body">
            <app-purchase-item-index [purchase_items]="purchase_items"
                (emitAddItem)="addItem()"></app-purchase-item-index>
        </div>
    </div>

    <div ngbAccordion [closeOthers]="true" class="mb-3">
        <div ngbAccordionItem>
            <h2 ngbAccordionHeader>
                <button ngbAccordionButton>+ Opciones</button>
            </h2>
            <div ngbAccordionCollapse>
                <div ngbAccordionBody>
                    <ng-template>
                        <app-purchase-form [form]="form"  [suppliers]="suppliers"></app-purchase-form>
                    </ng-template>
                </div>
            </div>
        </div>
    </div>


    <div class="w-100 mb-3">
        <app-button color="dark" [icon]="faSave" [disabled]="disabledButton" [spinner]="loadingIcon"
            (click)="update()">Guardar cambios</app-button>
    </div>

    <!-- {{ form.value | json }}
    {{ form.status }} -->

</form>

}
