<ng-container [formGroup]="formGroup">
    <td>
        <app-input-group [mb]="0">
            <input formControlName="quantity" type="number" step="0.01" class="form-control text-center"
                [class.is-invalid]="form.get('quantity')?.invalid && form.get('quantity')?.touched" placeholder="0"
                aria-label="quantity" aria-describedby="quantity-price" />
        </app-input-group>
    </td>
    <td>

        <app-unit-selected formControlName="unit_id"
            [class.is-invalid]="form.get('unit_id')?.invalid && form.get('unit_id')?.touched"></app-unit-selected>
    </td>
    <td>
        <app-input-group [mb]="0">
            <input formControlName="name" type="text" class="form-control"
                [class.is-invalid]="form.get('name')?.invalid && form.get('name')?.touched"
                placeholder="Nombre del insumo" aria-label="name" aria-describedby="basic-name" />
        </app-input-group>
    </td>

    <td>
        <app-input-group [mb]="0">
            <input formControlName="price" type="number" step="0.01" class="form-control text-center" twoDecimals
                [class.is-invalid]="form.get('price')?.invalid && form.get('price')?.touched" placeholder="0.00"
                aria-label="price" aria-describedby="basic-price" />
        </app-input-group>
    </td>
    <td>
        <app-input-group [mb]="0">
            <input formControlName="subtotal" type="number" twoDecimals
                [class.is-invalid]="form.get('subtotal')?.invalid && form.get('subtotal')?.touched" step="0.01"
                class="form-control text-center" placeholder="0.00" aria-label="subtotal" aria-describedby="basic-subtotal" />
        </app-input-group>
    </td>
    <td>
        <app-button-trash (click)="removeItem()"></app-button-trash>
    </td>

</ng-container>
